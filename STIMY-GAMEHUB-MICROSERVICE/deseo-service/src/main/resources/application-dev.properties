# Base de datos local de desarrollo (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/stimy_deseo_db_dev
spring.datasource.username=postgres
spring.datasource.password=tu_contrasena_postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración JPA e Hibernate para desarrollo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Inicialización automática de scripts SQL
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true