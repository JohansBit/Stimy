# Base de datos exclusiva y aislada para pruebas unitarias del Carrito
spring.datasource.url=jdbc:postgresql://localhost:5432/stimy_carrito_db_test
spring.datasource.username=postgres
spring.datasource.password=tu_contrasena_postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# create-drop: Limpia la base de datos por completo al terminar los tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Desactivar inicializaciones sql automáticas en fase de pruebas
spring.sql.init.mode=never