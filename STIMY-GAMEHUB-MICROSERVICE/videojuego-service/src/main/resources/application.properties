server.port=8092
spring.application.name=videojuego-service
spring.datasource.url=jdbc:mysql://localhost:3306/stimy_videojuegos_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# --- CONEXIÓN A EUREKA SERVER ---
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# --- CONFIGURACIÓN DE SWAGGER CLIENTE ---
springdoc.api-docs.path=/api/videojuegos/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
server.forward-headers-strategy=framework
springdoc.embedded-validator.enabled=false