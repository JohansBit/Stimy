      context: ./STIMY-GAMEHUB-MICROSERVICE/STIMY-GAMEHUB-MICROSERVICE/pago-service
      dockerfile: Dockerfile
    ports:
      - "8098:8098"
    depends_on:
      - postgres-db
    environment:
      - SPRING_PROFILES_ACTIVE=dev
