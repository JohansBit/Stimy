version: '3.8'

services:
  # =========================================================================
  # 🐘 BASE DE DATOS CENTRALIZADA (POSTGRESQL)
  # =========================================================================
  postgres-db:
    image: postgres:16
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tu_contrasena_postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =========================================================================
  # 🔍 SERVIDOR DE DESCUBRIMIENTO (EUREKA SERVER)
  # =========================================================================
  eureka-server:
    build:
      context: ./STIMY-GAMEHUB-MICROSERVICE/eureka-server
      dockerfile: Dockerfile
    container_name: gamehub-eureka
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =========================================================================
  # 🚪 ENRUTAMIENTO PERIMETRAL (API GATEWAY)
  # =========================================================================
  api-gateway:
    build:
      context: ./STIMY-GAMEHUB-MICROSERVICE/api-gateway
      dockerfile: Dockerfile
    container_name: gamehub-gateway
    ports:
      - "8080-8089:8080-8089"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xms64m -Xmx256m -XX:+UseSerialGC
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 300M

  # =========================================================================
  # 🎮 MICROSERVICIOS NÚCLEO (CORE SERVICES)
  # =========================================================================
  videojuego-service:
    build:
      context: ./STIMY-GAMEHUB-MICROSERVICE/videojuego-service
      dockerfile: Dockerfile
    container_name: gamehub-videojuegos
    ports:
      - "8091:8091"
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/stimy_videojuego_db_dev
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=tu_contrasena_postgres
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xms64m -Xmx256m -XX:+UseSerialGC
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 300M

  usuario-service:
