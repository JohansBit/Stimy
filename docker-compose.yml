version: '3.8'

services:
  # =========================================================================
  # 🐘 BASE DE DATOS CENTRALIZADA (POSTGRESQL)
  # =========================================================================
  postgres-db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tu_contrasena_postgres

  # =========================================================================
  # 🚪 ENRUTAMIENTO PERIMETRAL (API GATEWAY)
  # =========================================================================
  api-gateway:
    build:
      context: ./STIMY-GAMEHUB-MICROSERVICE/STIMY-GAMEHUB-MICROSERVICE/api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"  # Puerto por donde entrarán todas las peticiones desde Postman / Frontend
    environment:
      - VIDEOJUEGO_SERVICE_URL=http://videojuego-service:8091
      - USUARIO_SERVICE_URL=http://usuario-service:8092
      - CARRITO_SERVICE_URL=http://carrito-service:8093
      - DESEO_SERVICE_URL=http://deseo-service:8094
      - LOGRO_SERVICE_URL=http://logro-service:8095
      - RESENIA_SERVICE_URL=http://resenia-service:8096
      - SOPORTE_SERVICE_URL=http://soporte-service:8097
      - PAGO_SERVICE_URL=http://pago-service:8098
      - BIBLIOTECA_SERVICE_URL=http://biblioteca-service:8099

  # =========================================================================
  # 🎮 MICROSERVICIOS NÚCLEO (CORE SERVICES)
  # =========================================================================
  videojuego-service:
    build:
      context: ./STIMY-GAMEHUB-MICROSERVICE/STIMY-GAMEHUB-MICROSERVICE/videojuego-service
      dockerfile: Dockerfile
    ports:
      - "8091:8091"
    depends_on:
      - postgres-db
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/stimy_videojuego_db_dev
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=tu_contrasena_postgres

  usuario-service:
    build:
      context: ./STIMY-GAMEHUB-MICROSERVICE/STIMY-GAMEHUB-MICROSERVICE/usuario-service
      dockerfile: Dockerfile
    ports:
      - "8092:8092"
    depends_on:
      - postgres-db
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/stimy_usuario_db_dev
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=tu_contrasena_postgres

  # =========================================================================
  # ⚙️ MICROSERVICIOS SATÉLITES (LOGIC SERVICES)
  # =========================================================================
  carrito-service:
    build:
      context: ./STIMY-GAMEHUB-MICROSERVICE/STIMY-GAMEHUB-MICROSERVICE/carrito-service
      dockerfile: Dockerfile
    ports:
      - "8093:8093"
    depends_on:
      - postgres-db
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/stimy_carrito_db_dev
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=tu_contrasena_postgres

  deseo-service:
    build:
      context: ./STIMY-GAMEHUB-MICROSERVICE/STIMY-GAMEHUB-MICROSERVICE/deseo-service
      dockerfile: Dockerfile
    ports:
      - "8094:8094"
    depends_on:
      - postgres-db
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/stimy_deseo_db_dev
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=tu_contrasena_postgres

  logro-service:
