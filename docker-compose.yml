      - postgres-db
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/stimy_resenia_db_dev
      - SPRING_DATASOURCE_USERNAME=postgres
