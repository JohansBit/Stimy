# Configuración de conexión a la base de datos en Laragon
spring.datasource.url=jdbc:mysql://localhost:3306/stimy_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Permitir que Spring Boot (Hibernate) cree o actualice las tablas automáticamente a partir de tus Modelos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Habilitar la ejecución de scripts SQL al iniciar (necesario para el paso 2)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.application.name=gamehub-service